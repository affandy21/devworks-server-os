---
- name: Install security packages
  ansible.builtin.apt:
    name:
      - openssh-server
      - ufw
      - fail2ban
      - unattended-upgrades
    state: present
    update_cache: true

- name: Configure SSH hardening
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/90-devworks.conf
    mode: "0644"
    content: |
      Port {{ devworks_ssh_port }}
      PermitRootLogin no
      PasswordAuthentication no
      PubkeyAuthentication yes
      KbdInteractiveAuthentication no
      X11Forwarding no
      ClientAliveInterval 300
      ClientAliveCountMax 2
      MaxAuthTries 4
      LoginGraceTime 30
  notify: Restart ssh

- name: Configure UFW incoming default
  ansible.builtin.command: ufw default deny incoming
  changed_when: "'Default incoming policy changed' in ufw_incoming.stdout"
  register: ufw_incoming

- name: Configure UFW outgoing default
  ansible.builtin.command: ufw default allow outgoing
  changed_when: "'Default outgoing policy changed' in ufw_outgoing.stdout"
  register: ufw_outgoing

- name: Allow SSH
  ansible.builtin.command: "ufw allow {{ devworks_ssh_port }}/tcp"
  changed_when: "'Rule added' in ufw_ssh.stdout"
  register: ufw_ssh

- name: Allow HTTP
  ansible.builtin.command: ufw allow 80/tcp
  changed_when: "'Rule added' in ufw_http.stdout"
  register: ufw_http
  when: devworks_open_web_firewall | default(false) | bool

- name: Allow HTTPS
  ansible.builtin.command: ufw allow 443/tcp
  changed_when: "'Rule added' in ufw_https.stdout"
  register: ufw_https
  when: devworks_open_web_firewall | default(false) | bool

- name: Enable UFW
  ansible.builtin.command: ufw --force enable
  changed_when: "'Firewall is active' in ufw_enable.stdout or 'Firewall stopped and disabled' not in ufw_enable.stdout"
  register: ufw_enable

- name: Enable unattended upgrades
  ansible.builtin.systemd:
    name: unattended-upgrades
    enabled: true
    state: started
