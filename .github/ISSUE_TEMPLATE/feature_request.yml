name: Feature Request
description: Suggest an improvement for Devworks Server OS
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Installer
        - Desktop/GUI
        - Monitoring
        - Security
        - Web service
        - AI runtime
        - Documentation
        - Other
    validations:
      required: true

